<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario disponibilidad Guardias</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;600&family=IBM+Plex+Serif:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-dark:  #005A8E;
            --blue-mid:   #0080B4;
            --blue-light: #3AABE0;
            --teal:       #00A3B4;
            --white:      #FFFFFF;
            --text-dark:  #00304E;
            --text-mid:   #1A6A8C;
        }
 
        * { margin: 0; padding: 0; box-sizing: border-box; }
 
        body {
            min-height: 100vh;
            background: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'IBM Plex Sans', sans-serif;
            overflow: hidden;
            position: relative;
        }
 
        body::before {
            content: '';
            position: fixed;
            width: 620px;
            height: 620px;
            background: radial-gradient(circle, #BDEAF7 0%, transparent 68%);
            top: -180px;
            right: -160px;
            z-index: 0;
            opacity: 0.55;
        }
 
        body::after {
            content: '';
            position: fixed;
            width: 520px;
            height: 520px;
            background: radial-gradient(circle, #CBF0F5 0%, transparent 68%);
            bottom: -120px;
            left: -120px;
            z-index: 0;
            opacity: 0.6;
        }
 
        .dots { position: fixed; z-index: 0; opacity: 0.1; }
 
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 3rem 4rem;
            max-width: 540px;
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(18px);
            border-radius: 24px;
            border: 1px solid rgba(0, 128, 180, 0.2);
            box-shadow:
                0 4px 36px rgba(0, 90, 142, 0.09),
                0 1px 4px rgba(0, 90, 142, 0.06);
            animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
        }
 
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }
 
        .icon {
            font-size: 2.5rem;
            margin-bottom: 1.2rem;
            display: block;
            animation: fadeUp 0.9s 0.08s cubic-bezier(0.22, 1, 0.36, 1) both;
        }
 
        h1 {
            font-family: 'IBM Plex Serif', serif;
            font-weight: 300;
            font-size: 1.75rem;
            color: var(--text-dark);
            letter-spacing: -0.01em;
            line-height: 1.35;
            margin-bottom: 1.2rem;
            animation: fadeUp 0.9s 0.14s cubic-bezier(0.22, 1, 0.36, 1) both;
        }
 
        h1 span { color: var(--blue-mid); }
 
        .divider {
            width: 48px;
            height: 2px;
            background: linear-gradient(90deg, var(--blue-dark), var(--teal));
            border-radius: 99px;
            margin: 0 auto 1.4rem;
            animation: fadeUp 0.9s 0.2s cubic-bezier(0.22, 1, 0.36, 1) both;
        }
 
        p {
            color: var(--text-mid);
            font-size: 0.97rem;
            font-weight: 400;
            line-height: 1.7;
            margin-bottom: 0.45rem;
            animation: fadeUp 0.9s 0.26s cubic-bezier(0.22, 1, 0.36, 1) both;
        }
 
        p:last-child { margin-bottom: 0; animation-delay: 0.32s; }
    </style>
</head>
<body>
 
    <svg class="dots" style="top:6%;left:4%" width="72" height="72" viewBox="0 0 72 72">
        <circle cx="8" cy="8" r="3" fill="#0080B4"/><circle cx="24" cy="8" r="3" fill="#0080B4"/>
        <circle cx="40" cy="8" r="3" fill="#0080B4"/><circle cx="8" cy="24" r="3" fill="#0080B4"/>
        <circle cx="24" cy="24" r="3" fill="#0080B4"/><circle cx="40" cy="24" r="3" fill="#0080B4"/>
        <circle cx="8" cy="40" r="3" fill="#0080B4"/><circle cx="24" cy="40" r="3" fill="#0080B4"/>
    </svg>
 
    <svg class="dots" style="bottom:7%;right:5%" width="72" height="72" viewBox="0 0 72 72">
        <circle cx="8" cy="8" r="3" fill="#0080B4"/><circle cx="24" cy="8" r="3" fill="#0080B4"/>
        <circle cx="40" cy="8" r="3" fill="#0080B4"/><circle cx="8" cy="24" r="3" fill="#0080B4"/>
        <circle cx="24" cy="24" r="3" fill="#0080B4"/><circle cx="40" cy="24" r="3" fill="#0080B4"/>
        <circle cx="8" cy="40" r="3" fill="#0080B4"/><circle cx="24" cy="40" r="3" fill="#0080B4"/>
        <circle cx="40" cy="40" r="3" fill="#0080B4"/>
    </svg>
 
    <div class="container">
        <span class="icon">🗓️</span>
        <h1>Guardias hasta septiembre<br><span>en progreso</span></h1>
        <div class="divider"></div>
        <p>Estarán disponibles próximamente.</p>
        <p>Para emergencias, contactar directamente.</p>
    </div>
 
</body>
</html>
