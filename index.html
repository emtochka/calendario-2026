<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Disponibilidad 2026-2027</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ¡¡¡ATENCIÓN!!! - REEMPLAZA CON TU URL DE GOOGLE APPS SCRIPT
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbynxWYWJceX6GwsRx0rJdWRAaJLUPRgoh-Kysp_qaPmTcgoYIWqUP6pzLX5Q4uoVQCn9w/exec';

        // JSONP helper - evita CORS completamente
        const jsonpRequest = (params) => {
            return new Promise((resolve, reject) => {
                const callbackName = 'jsonp_' + Date.now() + '_' + Math.floor(Math.random() * 1000);
                
                window[callbackName] = (data) => {
                    delete window[callbackName];
                    document.body.removeChild(script);
                    resolve(data);
                };

                const script = document.createElement('script');
                const queryString = new URLSearchParams({...params, callback: callbackName}).toString();
                script.src = `${SCRIPT_URL}?${queryString}`;
                script.onerror = () => {
                    delete window[callbackName];
                    document.body.removeChild(script);
                    reject(new Error('Error de conexión'));
                };
                
                document.body.appendChild(script);
            });
        };

        const CalendarioDisponibilidad = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [isAdmin, setIsAdmin] = useState(false);
            const [userCode, setUserCode] = useState('');
            const [codeInput, setCodeInput] = useState('');
            const [loginError, setLoginError] = useState('');
            const [currentMonth, setCurrentMonth] = useState(0);
            const [personName, setPersonName] = useState('');
            const [allUsers, setAllUsers] = useState([]);
            const [availability, setAvailability] = useState({});
            const [loading, setLoading] = useState(false);

            // Bloqueo de meses por rango: -1 = ninguno, 0 = enero 2026, ..., 12 = enero 2027
            const [lockUntilMonth, setLockUntilMonth] = useState(-1);
            const [savingLocks, setSavingLocks] = useState(false);

            const months = [
                'Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio',
                'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre',
                'Enero 2027'
            ];

            useEffect(() => {
                const savedCode = localStorage.getItem('userCode');
                const savedName = localStorage.getItem('userName');
                const savedIsAdmin = localStorage.getItem('isAdmin') === 'true';
                
                if (savedCode && savedName) {
                    setUserCode(savedCode);
                    setPersonName(savedName);
                    setIsAdmin(savedIsAdmin);
                    setIsAuthenticated(true);
                    
                    loadLockedMonths();

                    if (savedIsAdmin) {
                        loadAllUsers();
                    } else {
                        loadPersonData(savedName);
                    }
                }
            }, []);

            const getDaysInMonth = (month) => {
                const year = month === 12 ? 2027 : 2026;
                const actualMonth = month === 12 ? 0 : month;
                return new Date(year, actualMonth + 1, 0).getDate();
            };

            const getFirstDayOfMonth = (month) => {
                const year = month === 12 ? 2027 : 2026;
                const actualMonth = month === 12 ? 0 : month;
                const firstDay = new Date(year, actualMonth, 1).getDay();
                return firstDay === 0 ? 6 : firstDay - 1;
            };

            const getDateString = (month, day) => {
                const year = month === 12 ? 2027 : 2026;
                const actualMonth = month === 12 ? 0 : month;
                return `${year}-${String(actualMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            };

            // Convierte una fecha "YYYY-MM-DD" al índice de mes 0..12 (12 = enero 2027)
            const dateToMonthIndex = (dateString) => {
                const year = parseInt(dateString.substring(0, 4));
                const month = parseInt(dateString.substring(5, 7)) - 1;
                if (year === 2026) return month;
                if (year === 2027 && month === 0) return 12;
                return -1;
            };

            const isMonthLocked = (monthIndex) => {
                return monthIndex >= 0 && monthIndex <= lockUntilMonth;
            };

            const isDateLocked = (dateString) => {
                const idx = dateToMonthIndex(dateString);
                return isMonthLocked(idx);
            };

            const handleDayClick = (dateString) => {
                // Usuarios normales no pueden modificar días de meses bloqueados
                if (isDateLocked(dateString) && !isAdmin) {
                    return;
                }

                setAvailability(prev => {
                    const current = prev[dateString] || 'neutral';
                    const next = current === 'neutral' ? 'unavailable' : 
                                 current === 'unavailable' ? 'available' : 'neutral';
                    
                    if (next === 'neutral') {
                        const newAvail = { ...prev };
                        delete newAvail[dateString];
                        return newAvail;
                    }
                    
                    return { ...prev, [dateString]: next };
                });
            };

            const getDayColor = (dateString) => {
                const status = availability[dateString] || 'neutral';
                const locked = isDateLocked(dateString) && !isAdmin;

                if (status === 'available') {
                    return locked
                        ? 'bg-green-500 text-white opacity-60 cursor-not-allowed'
                        : 'bg-green-500 text-white';
                }
                if (status === 'unavailable') {
                    return locked
                        ? 'bg-red-500 text-white opacity-60 cursor-not-allowed'
                        : 'bg-red-500 text-white';
                }
                return locked
                    ? 'bg-gray-200 cursor-not-allowed opacity-60'
                    : 'bg-gray-100 hover:bg-gray-200';
            };

            const handleLogin = async () => {
                if (!codeInput.trim()) {
                    setLoginError('Por favor, introduce un código');
                    return;
                }

                setLoading(true);
                setLoginError('');

                try {
                    const result = await jsonpRequest({ action: 'validateCode', code: codeInput.trim() });
                    
                    if (result.success) {
                        setUserCode(codeInput.trim());
                        setPersonName(result.name);
                        setIsAdmin(result.isAdmin || false);
                        setIsAuthenticated(true);
                        
                        localStorage.setItem('userCode', codeInput.trim());
                        localStorage.setItem('userName', result.name);
                        localStorage.setItem('isAdmin', result.isAdmin || false);

                        await loadLockedMonths();

                        if (result.isAdmin) {
                            await loadAllUsers();
                        } else {
                            await loadPersonData(result.name);
                        }
                    } else {
                        setLoginError(result.message || 'Código inválido');
                    }
                } catch (error) {
                    console.error('Error al autenticar:', error);
                    setLoginError('Error al conectar con el servidor. Por favor, intenta de nuevo.');
                } finally {
                    setLoading(false);
                }
            };

            const handleLogout = () => {
                setIsAuthenticated(false);
                setIsAdmin(false);
                setUserCode('');
                setCodeInput('');
                setPersonName('');
                setAllUsers([]);
                setAvailability({});
                setLockUntilMonth(-1);
                localStorage.clear();
            };

            const loadAllUsers = async () => {
                try {
                    const result = await jsonpRequest({ action: 'getAllUsers' });
                    if (result.success && result.users) {
                        setAllUsers(result.users);
                    }
                } catch (error) {
                    console.error('Error al cargar usuarios:', error);
                }
            };

            const loadLockedMonths = async () => {
                try {
                    const result = await jsonpRequest({ action: 'getLockedMonths' });
                    if (result.success) {
                        setLockUntilMonth(
                            result.lockUntilMonth !== undefined && result.lockUntilMonth !== null
                                ? result.lockUntilMonth
                                : -1
                        );
                    }
                } catch (error) {
                    console.error('Error al cargar meses bloqueados:', error);
                }
            };

            const handleAdminUserChange = async (e) => {
                const selectedUser = e.target.value;
                setPersonName(selectedUser);
                if (selectedUser) {
                    await loadPersonData(selectedUser);
                } else {
                    setAvailability({});
                }
            };

            const handleLockUntilChange = async (e) => {
                const newValue = parseInt(e.target.value);
                setSavingLocks(true);
                try {
                    const result = await jsonpRequest({
                        action: 'setLockedMonths',
                        monthIndex: newValue
                    });
                    if (result.success) {
                        setLockUntilMonth(newValue);
                    } else {
                        alert('Error al actualizar bloqueo: ' + (result.message || ''));
                    }
                } catch (err) {
                    alert('Error: ' + err.message);
                } finally {
                    setSavingLocks(false);
                }
            };

            const loadPersonData = async (name) => {
                setLoading(true);
                try {
                    const result = await jsonpRequest({ action: 'getData', name: name });
                    
                    if (result.success && result.data) {
                        setAvailability(result.data);
                    } else {
                        setAvailability({});
                    }
                } catch (error) {
                    console.error('❌ Error al cargar datos:', error);
                    alert('Error al cargar los datos: ' + error.message);
                } finally {
                    setLoading(false);
                }
            };

            const savePersonData = async () => {
                if (!personName) {
                    alert('Error: No hay usuario identificado');
                    return;
                }

                setLoading(true);
                try {
                    const formData = new FormData();
                    formData.append('action', 'saveData');
                    formData.append('name', personName);
                    formData.append('data', JSON.stringify(availability));

                    const response = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: formData
                    });

                    const result = await response.json();

                    if (result.success) {
                        alert('✅ Datos guardados correctamente');
                    } else {
                        throw new Error(result.message || 'Error desconocido al guardar');
                    }
                } catch (error) {
                    console.error('❌ Error al guardar:', error);
                    alert('Error al guardar los datos: ' + error.message);
                } finally {
                    setLoading(false);
                }
            };

            const deletePersonData = async () => {
                if (!personName) {
                    alert('Error: No hay usuario identificado');
                    return;
                }

                if (!confirm(`¿Estás seguro de que quieres eliminar TODOS tus datos de disponibilidad?`)) {
                    return;
                }

                setLoading(true);
                try {
                    const result = await jsonpRequest({ action: 'deleteData', name: personName });

                    if (result.success) {
                        setAvailability({});
                        alert('✅ Todos tus datos han sido eliminados');
                    } else {
                        throw new Error(result.message || 'Error al eliminar');
                    }
                } catch (error) {
                    console.error('❌ Error al eliminar:', error);
                    alert('Error al eliminar los datos: ' + error.message);
                } finally {
                    setLoading(false);
                }
            };

            const renderCalendar = () => {
                const daysInMonth = getDaysInMonth(currentMonth);
                const firstDay = getFirstDayOfMonth(currentMonth);
                const days = [];
                
                for (let i = 0; i < firstDay; i++) {
                    days.push(<div key={`empty-${i}`} className="aspect-square"></div>);
                }
                
                for (let day = 1; day <= daysInMonth; day++) {
                    const dateString = getDateString(currentMonth, day);
                    days.push(
                        <button
                            key={dateString}
                            onClick={() => handleDayClick(dateString)}
                            className={`aspect-square p-2 rounded transition-colors ${getDayColor(dateString)}`}
                        >
                            {day}
                        </button>
                    );
                }
                
                return days;
            };

            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen bg-gray-50 flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
                            <h1 className="text-2xl font-bold mb-6 text-center">Calendario de Guardias</h1>
                            <div className="space-y-4">
                                <input
                                    type="text"
                                    value={codeInput}
                                    onChange={(e) => setCodeInput(e.target.value)}
                                    onKeyPress={(e) => e.key === 'Enter' && handleLogin()}
                                    placeholder="Introduce tu código"
                                    className="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    disabled={loading}
                                />
                                {loginError && (
                                    <p className="text-red-500 text-sm">{loginError}</p>
                                )}
                                <button
                                    onClick={handleLogin}
                                    disabled={loading}
                                    className="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600 disabled:bg-gray-400"
                                >
                                    {loading ? 'Cargando...' : 'Entrar'}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            const currentMonthLocked = isMonthLocked(currentMonth);

            return (
                <div className="min-h-screen bg-gray-50 p-4">
                    <div className="max-w-4xl mx-auto">
                        <div className="bg-white rounded-lg shadow-md p-6 mb-4">
                            <div className="flex justify-between items-center mb-4">
                                <div>
                                    <h1 className="text-2xl font-bold">Calendario de Guardias 2026-2027</h1>
                                    <p className="text-gray-600">
                                        {isAdmin ? `Modo Admin - Editando: ${personName || 'Selecciona un usuario'}` : `Usuario: ${personName}`}
                                    </p>
                                </div>
                                <button
                                    onClick={handleLogout}
                                    className="px-4 py-2 bg-gray-500 text-white rounded hover:bg-gray-600"
                                >
                                    Cerrar sesión
                                </button>
                            </div>

                            {isAdmin && (
                                <div className="mb-4">
                                    <label className="block text-sm font-medium mb-2">Seleccionar usuario:</label>
                                    <select
                                        value={personName}
                                        onChange={handleAdminUserChange}
                                        className="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    >
                                        <option value="">-- Selecciona un usuario --</option>
                                        {allUsers.map(user => (
                                            <option key={user} value={user}>{user}</option>
                                        ))}
                                    </select>
                                </div>
                            )}

                            {isAdmin && (
                                <div className="mb-4 p-3 bg-blue-50 border border-blue-200 rounded">
                                    <label className="block text-sm font-medium mb-2">
                                        🔒 Bloquear meses hasta (incluido):
                                    </label>
                                    <select
                                        value={lockUntilMonth}
                                        onChange={handleLockUntilChange}
                                        disabled={savingLocks}
                                        className="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    >
                                        <option value={-1}>Ningún mes bloqueado</option>
                                        {months.map((m, idx) => (
                                            <option key={idx} value={idx}>Hasta {m} (incluido)</option>
                                        ))}
                                    </select>
                                    <p className="text-xs text-gray-600 mt-1">
                                        Los usuarios no podrán modificar enero 2026 hasta el mes seleccionado.
                                        {savingLocks && ' Guardando...'}
                                    </p>
                                </div>
                            )}

                            <div className="flex items-center justify-between mb-4">
                                <button
                                    onClick={() => setCurrentMonth(Math.max(0, currentMonth - 1))}
                                    disabled={currentMonth === 0}
                                    className="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 disabled:bg-gray-300"
                                >
                                    ← Anterior
                                </button>
                                <h2 className="text-xl font-semibold">{months[currentMonth]}</h2>
                                <button
                                    onClick={() => setCurrentMonth(Math.min(12, currentMonth + 1))}
                                    disabled={currentMonth === 12}
                                    className="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 disabled:bg-gray-300"
                                >
                                    Siguiente →
                                </button>
                            </div>

                            {currentMonthLocked && (
                                <div className="mb-4 p-3 bg-yellow-100 border border-yellow-400 rounded text-yellow-800 text-sm flex items-center gap-2">
                                    <span>🔒</span>
                                    <span>
                                        <strong>Mes bloqueado:</strong>{' '}
                                        {isAdmin
                                            ? 'puedes editar como admin.'
                                            : 'no puedes modificar este mes mientras se asignan las guardias.'}
                                    </span>
                                </div>
                            )}

                            <div className="grid grid-cols-7 gap-2 mb-4">
                                {['L', 'M', 'X', 'J', 'V', 'S', 'D'].map(day => (
                                    <div key={day} className="text-center font-semibold text-gray-600">
                                        {day}
                                    </div>
                                ))}
                                {renderCalendar()}
                            </div>

                            <div className="flex gap-4 mb-4">
                                <div className="flex items-center gap-2">
                                    <div className="w-4 h-4 bg-green-500 rounded"></div>
                                    <span className="text-sm">Disponible</span>
                                </div>
                                <div className="flex items-center gap-2">
                                    <div className="w-4 h-4 bg-red-500 rounded"></div>
                                    <span className="text-sm">No disponible</span>
                                </div>
                                <div className="flex items-center gap-2">
                                    <div className="w-4 h-4 bg-gray-100 border border-gray-300 rounded"></div>
                                    <span className="text-sm">Sin especificar</span>
                                </div>
                            </div>

                            <div className="flex gap-2">
                                <button
                                    onClick={savePersonData}
                                    disabled={loading || !personName}
                                    className="flex-1 px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600 disabled:bg-gray-300"
                                >
                                    {loading ? 'Guardando...' : 'Guardar'}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<CalendarioDisponibilidad />, document.getElementById('root'));
    </script>
</body>
</html>
